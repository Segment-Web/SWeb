name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: segment_test
          POSTGRES_USER: segment
          POSTGRES_PASSWORD: segment_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U segment -d segment_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm test:auth
        env:
          TEST_DATABASE_URL: postgresql://segment:segment_test@localhost:5432/segment_test
      - run: docker build --tag segment:ci .
