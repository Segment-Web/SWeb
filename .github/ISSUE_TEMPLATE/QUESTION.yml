name: Question or support
description: Ask about using Segment Web or report a problem that is not clearly a bug.
title: "[Question] "
labels:
  - question
  - needs triage
body:
  - type: markdown
    attributes:
      value: |
        Use this form for focused questions about Segment Web.

        Never include passwords, one-time codes, access tokens, private messages, or other sensitive information.

  - type: textarea
    id: question
    attributes:
      label: Question
      description: Explain what you are trying to do and where you are stuck.
    validations:
      required: true

  - type: textarea
    id: attempted
    attributes:
      label: What have you tried?
      description: Describe the steps you already tried and their result.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Segment Web version
      placeholder: 0.0.1-beta

  - type: input
    id: browser
    attributes:
      label: Browser and operating system
      placeholder: Chrome 138 on Windows 11

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and documentation first.
          required: true
        - label: I removed all sensitive and private information.
          required: true

